name: Compile Kernel

on:
  workflow_dispatch:
    inputs:
      clang_version:
        description: Type the clang version of ur kernel
        required: true
        type: choice
        default: clang-r563880c
        options:
          - clang-r416183b1 # lineage-19.1 in android12-qpr3-release
          - clang-r450784d  # lineage-20.0 in android13-qpr3-release
          - clang-r487747c  # lineage-21.0 in android14-qpr3-release
          - clang-r536225   # lineage-22.2 in android15-qpr2-release
          - clang-r547379   # lineage-23.0
          - clang-r563880c  # lineage-23.2
      kernel_source:
        description: Kernel Source Code
        required: true
        type: choice
        options:
          - LineageOS
          - crdroidandroid
          - OnePlus12R-development
      kernel_branch:
        description: Kernel Branch (such as lineage-23.2 or sixteen-qpr1)
        required: true
        type: string
        default: ""
      ksu_type:
        description: KernelSU Version
        required: true
        type: choice
        options:
          - None
          - Official-KernelSU
          - KernelSU-Next
          - KernelSU-Next-with-susfs
          - KowSU
          - ReSukiSU
          - ReSukiSU-with-susfs

jobs:
  Kernel_CI:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      group: kernel-ci-${{ github.workflow }}-${{ github.ref_name }}-${{ inputs.kernel_source }}-${{ inputs.kernel_branch }}-${{ inputs.ksu_type }}-${{ inputs.clang_version }}
      cancel-in-progress: true

    permissions:
      contents: write
      actions: read
      checks: read

    env:
      GH_TOKEN: ${{ github.token }}
      SOC: sm8550

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SWAP
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 16

      - name: Install build dependencies
        run: |
          set -euo pipefail
          sudo apt update
          sudo apt install -y \
            bc \
            bison \
            flex \
            libssl-dev \
            libelf-dev \
            libdw-dev \
            build-essential \
            lz4 \
            git \
            python3 \
            curl \
            dwarves \
            cpio \
            gcc-aarch64-linux-gnu

      - name: Validate inputs
        run: |
          set -euo pipefail

          if [ -z "${{ inputs.kernel_branch }}" ]; then
            echo "kernel_branch cannot be empty"
            exit 1
          fi

          case "${{ inputs.kernel_source }}" in
            LineageOS|OnePlus12R-development)
              if [[ ! "${{ inputs.kernel_branch }}" =~ ^lineage- ]]; then
                echo "Warning: ${{ inputs.kernel_source }} usually uses lineage-* branches"
              fi
              ;;
            crdroidandroid)
              echo "Note: crdroidandroid branch naming may differ from LineageOS"
              ;;
            *)
              echo "Unknown kernel_source: ${{ inputs.kernel_source }}"
              exit 1
              ;;
          esac

      - name: Set build metadata
        run: |
          set -euo pipefail
          echo "BUILD_TIMESTAMP=$(date -u +'%Y%m%d_%H%M')" >> "$GITHUB_ENV"

      - name: Restore AOSP Clang cache
        id: clang-cache
        uses: actions/cache@v4
        with:
          path: toolchains/${{ inputs.clang_version }}
          key: ${{ runner.os }}-aosp-clang-${{ inputs.clang_version }}

      - name: Clone Kernel Source
        run: |
          set -euo pipefail

          KERNEL_REPO="https://github.com/${{ inputs.kernel_source }}/android_kernel_oneplus_${SOC}.git"
          MODULES_REPO="https://github.com/${{ inputs.kernel_source }}/android_kernel_oneplus_${SOC}-modules.git"

          echo "Cloning kernel repo: $KERNEL_REPO"
          git clone --depth=1 --single-branch --no-tags -b "${{ inputs.kernel_branch }}" "$KERNEL_REPO" "${SOC}" || {
            echo "::error::Failed to clone kernel repo for branch '${{ inputs.kernel_branch }}': $KERNEL_REPO"
            exit 1
          }

          echo "Cloning modules repo: $MODULES_REPO"
          git clone --depth=1 --single-branch --no-tags -b "${{ inputs.kernel_branch }}" "$MODULES_REPO" "${SOC}-modules" || {
            echo "::error::Failed to clone modules repo for branch '${{ inputs.kernel_branch }}': $MODULES_REPO"
            echo "::error::This kernel tree expects a sibling '${SOC}-modules' repo during defconfig/Kconfig resolution."
            exit 1
          }

      - name: Download AOSP Clang
        if: steps.clang-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail

          case "${{ inputs.clang_version }}" in
            "clang-r416183b1")
              URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android12-qpr3-release/clang-r416183b1.tar.gz"
              ;;
            "clang-r450784d")
              URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android13-qpr3-release/clang-r450784d.tar.gz"
              ;;
            "clang-r487747c")
              URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android14-qpr3-release/clang-r487747c.tar.gz"
              ;;
            "clang-r536225")
              URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android15-qpr2-release/clang-r536225.tar.gz"
              ;;
            "clang-r547379")
              URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android16-qpr2-release/clang-r547379.tar.gz"
              ;;
            "clang-r563880c")
              URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android16-qpr2-release/clang-r563880c.tar.gz"
              ;;
            *)
              echo "Unsupported clang version: ${{ inputs.clang_version }}"
              exit 1
              ;;
          esac

          mkdir -p "toolchains/${{ inputs.clang_version }}"
          curl --retry 5 --retry-delay 3 --retry-all-errors -fL "$URL" -o "${{ inputs.clang_version }}.tar.gz"
          tar -xf "${{ inputs.clang_version }}.tar.gz" -C "toolchains/${{ inputs.clang_version }}"
          rm -f "${{ inputs.clang_version }}.tar.gz"

      - name: Validate AOSP Clang
        run: |
          set -euo pipefail
          test -x "${GITHUB_WORKSPACE}/toolchains/${{ inputs.clang_version }}/bin/clang"

      - name: Compile Kernel
        run: |
          set -euo pipefail

          apply_susfs_task_mmu_fix() {
            local file="fs/proc/task_mmu.c"

            if grep -q 'susfs_def.h' "$file"; then
              echo "[+] task_mmu.c already includes susfs_def.h."
              return 0
            fi

            if grep -q '^#include <linux/pkeys.h>$' "$file"; then
              sed -i '/^#include <linux\/pkeys.h>$/a #if defined(CONFIG_KSU_SUSFS_SUS_KSTAT) || defined(CONFIG_KSU_SUSFS_SUS_MAP) || defined(CONFIG_KSU_SUSFS_OPEN_REDIRECT)\n#include <linux/susfs_def.h>\n#endif' "$file"
              echo "[+] Applied fallback susfs include fix to task_mmu.c."
              return 0
            fi

            echo "[-] Could not find a stable insertion point in $file."
            return 1
          }

          patch_susfs_kernelsu_layout() {
            local file="fs/susfs.c"

            if [[ ! -f "$file" ]]; then
              return 0
            fi

            if [[ -f "drivers/kernelsu/hook/core_hook.h" ]] && [[ ! -f "drivers/kernelsu/core_hook.h" ]]; then
              sed -i 's|"\.\./drivers/kernelsu/core_hook.h"|"../drivers/kernelsu/hook/core_hook.h"|' "$file"
              echo "[+] Patched susfs core_hook include for nested KernelSU layout."
            fi
          }

          set_config_value() {
            local config_file="$1"
            local key="$2"
            local value="$3"

            if [[ "$value" == "n" ]]; then
              if grep -q "^${key}=" "$config_file"; then
                sed -i "s|^${key}=.*|# ${key} is not set|" "$config_file"
              elif grep -q "^# ${key} is not set$" "$config_file"; then
                :
              else
                echo "# ${key} is not set" >> "$config_file"
              fi
            else
              if grep -q "^${key}=" "$config_file"; then
                sed -i "s|^${key}=.*|${key}=${value}|" "$config_file"
              elif grep -q "^# ${key} is not set$" "$config_file"; then
                sed -i "s|^# ${key} is not set$|${key}=${value}|" "$config_file"
              else
                echo "${key}=${value}" >> "$config_file"
              fi
            fi
          }

          CLANG_ROOT="${GITHUB_WORKSPACE}/toolchains/${{ inputs.clang_version }}/bin"
          export PATH="${CLANG_ROOT}:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          export CC="${CLANG_ROOT}/clang"
          export CXX="${CLANG_ROOT}/clang++"
          export HOSTCC="${CLANG_ROOT}/clang"
          export HOSTCXX="${CLANG_ROOT}/clang++"
          export LD="${CLANG_ROOT}/ld.lld"
          export AR="${CLANG_ROOT}/llvm-ar"
          export NM="${CLANG_ROOT}/llvm-nm"
          export OBJCOPY="${CLANG_ROOT}/llvm-objcopy"
          export OBJDUMP="${CLANG_ROOT}/llvm-objdump"
          export STRIP="${CLANG_ROOT}/llvm-strip"

          cd "${SOC}"

          case "${{ inputs.ksu_type }}" in
            "None")
              ;;
            "Official-KernelSU")
              curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main
              ;;
            "KowSU")
              curl -LSs "https://raw.githubusercontent.com/KOWX712/KernelSU/main/kernel/setup.sh" | bash -s master
              ;;
            "KernelSU-Next")
              curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" | bash -
              ;;
            "KernelSU-Next-with-susfs")
              curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next-susfs/kernel/setup.sh" | bash -s next-susfs
              ;;
            "ReSukiSU"|"ReSukiSU-with-susfs")
              curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash -s main
              ;;
            *)
              echo "Unsupported ksu_type: ${{ inputs.ksu_type }}"
              exit 1
              ;;
          esac

          if [[ "${{ inputs.ksu_type }}" == *susfs ]]; then
            SUSFS_REF="gki-android13-5.15"
            git clone --depth=1 -b "$SUSFS_REF" https://gitlab.com/simonpunk/susfs4ksu.git susfs
            cd susfs
            cp ./kernel_patches/50_add_susfs_in_gki-android13-5.15.patch ..
            cp ./kernel_patches/fs/* ../fs/
            cp ./kernel_patches/include/linux/* ../include/linux/
            mkdir -p ../drivers/kernelsu/include/linux
            cp ./kernel_patches/include/linux/* ../drivers/kernelsu/include/linux/
            cd ..

            test -f include/linux/susfs_def.h || {
              echo "::error::susfs_def.h was not copied into include/linux from $SUSFS_REF"
              find include/linux -maxdepth 1 -type f -name 'susfs*' -print || true
              exit 1
            }

            if ! patch -p1 < 50_add_susfs_in_gki-android13-5.15.patch; then
              echo "[!] susfs patch reported conflicts, checking for known task_mmu.c drift..."

              reject_files="$(find . -name "*.rej" | sort)"
              reject_count="$(printf '%s\n' "$reject_files" | sed '/^$/d' | wc -l)"

              if [[ "$reject_count" -eq 1 ]] && [[ "$reject_files" == "./fs/proc/task_mmu.c.rej" ]] && grep -q 'susfs_def.h' ./fs/proc/task_mmu.c.rej; then
                apply_susfs_task_mmu_fix
                rm -f ./fs/proc/task_mmu.c.rej
                echo "[+] Resolved known susfs task_mmu.c patch drift."
              else
                echo "==== PATCH FAILED ===="
                echo "==== REJECT FILES ===="
                find . -name "*.rej" -print -exec sh -c 'echo "---- $1 ----"; cat "$1"' _ {} \;
                exit 1
              fi
            fi

            patch_susfs_kernelsu_layout

            {
              echo "CONFIG_KSU_SUSFS=y"
              echo "CONFIG_KSU_SUSFS_SUS_PATH=y"
              echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y"
              echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y"
              echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y"
              echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y"
              echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y"
              echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y"
            } >> arch/arm64/configs/gki_defconfig
          fi

          touch .scmversion

          if [[ "${{ inputs.ksu_type }}" != "None" ]]; then
            echo "CONFIG_TMPFS_XATTR=y" >> arch/arm64/configs/gki_defconfig
          fi

          make O=out gki_defconfig vendor/kalama_GKI.config vendor/oplus/kalama_GKI.config vendor/debugfs.config

          if [[ "${{ inputs.ksu_type }}" == *susfs ]]; then
            set_config_value out/.config CONFIG_KSU_SUSFS y
            set_config_value out/.config CONFIG_KSU_SUSFS_SUS_PATH y
            set_config_value out/.config CONFIG_KSU_SUSFS_SUS_MOUNT y
            set_config_value out/.config CONFIG_KSU_SUSFS_SUS_KSTAT y
            set_config_value out/.config CONFIG_KSU_SUSFS_SPOOF_UNAME y
            set_config_value out/.config CONFIG_KSU_SUSFS_ENABLE_LOG y
            set_config_value out/.config CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS y
            set_config_value out/.config CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG y
          fi

          if [[ "${{ inputs.ksu_type }}" != "None" ]]; then
            set_config_value out/.config CONFIG_TMPFS_XATTR y
          fi

          make O=out olddefconfig

          if [[ "${{ inputs.ksu_type }}" == *susfs ]]; then
            echo "==== SUSFS CONFIG SNAPSHOT ===="
            grep -E '^CONFIG_KSU_SUSFS|^CONFIG_TMPFS_XATTR=' out/.config || true
          fi

          make -j"$(nproc)" O=out Image 2>&1 | tee build.log || {
            echo "==== BUILD ERROR SUMMARY ===="
            grep -nE ' error:|undefined reference|No rule to make target|fatal error:' build.log | tail -n 50 || true
            echo "==== BUILD FAILED (last 200 lines) ===="
            tail -n 200 build.log || true
            exit 1
          }

          test -f out/arch/arm64/boot/Image

      - name: Make AnyKernel3
        run: |
          set -euo pipefail

          ZIP_NAME="${{ env.SOC }}_${{ inputs.ksu_type }}_${BUILD_TIMESTAMP}"
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

          git clone --depth=1 --single-branch --no-tags https://github.com/Kernel-SU/AnyKernel3.git
          cp "${SOC}/out/arch/arm64/boot/Image" AnyKernel3/Image

          cd AnyKernel3
          zip -r9 "../${ZIP_NAME}.zip" . -x .git/\* .github/\*

          test -f "../${ZIP_NAME}.zip"

      - name: Create GitHub Release
        run: |
          set -euo pipefail

          SAFE_BRANCH="${{ inputs.kernel_branch }}"
          SAFE_BRANCH="${SAFE_BRANCH//\//-}"
          REL_NAME="${SOC}_${{ inputs.kernel_source }}-${SAFE_BRANCH}_${{ inputs.ksu_type }}_${BUILD_TIMESTAMP}"
          ZIP_FILE="${GITHUB_WORKSPACE}/${ZIP_NAME}.zip"
          IMAGE_FILE="${GITHUB_WORKSPACE}/${SOC}/out/arch/arm64/boot/Image"

          test -f "${ZIP_FILE}"
          test -f "${IMAGE_FILE}"

          gh release create "$REL_NAME" \
            --title "$REL_NAME" \
            --notes "" \
            "$ZIP_FILE" \
            "$IMAGE_FILE"
